<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة — Local Test Harness</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',Tahoma,sans-serif;background:#0b141a;color:#e9edef;height:100vh;display:flex;flex-direction:column}
.header{background:#1f2c34;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222d35}
.header h1{font-size:18px;color:#00a884}
.status{padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600}
.status.ok{background:#00382a;color:#00a884}
.status.err{background:#3a1a1a;color:#ff6b6b}
.setup{background:#111b21;padding:12px;border-bottom:1px solid #222d35;font-size:12px;color:#8696a0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.setup input{background:#2a3942;border:none;color:#e9edef;padding:4px 8px;border-radius:4px;width:140px;font-size:12px}
.setup button{background:#005c4b;color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.container{flex:1;display:flex;overflow:hidden}
.phone-panel{flex:1;display:flex;flex-direction:column;border-left:1px solid #222d35}
.phone-panel:first-child{border-left:none}
.panel-label{background:linear-gradient(135deg,#00a884,#008f72);color:white;text-align:center;padding:6px;font-size:12px;font-weight:600;letter-spacing:1px}
.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;background:#060d11}
.msg{max-width:80%;padding:8px 10px;border-radius:8px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.out{background:#005c4b;align-self:flex-end;border-top-left-radius:0}
.msg.in{background:#1f2c34;align-self:flex-start;border-top-right-radius:0}
.msg .meta{font-size:10px;color:#8696a0;margin-top:4px}
.input-bar{display:flex;gap:8px;padding:10px;background:#1f2c34}
.input-bar input{flex:1;background:#2a3942;border:none;color:#e9edef;padding:10px 14px;border-radius:20px;font-size:14px;outline:none}
.input-bar input::placeholder{color:#8696a0}
.input-bar button{background:#00a884;color:white;border:none;padding:10px 18px;border-radius:20px;font-size:14px;cursor:pointer;font-weight:600}
.input-bar button:hover{background:#00c49a}
.input-bar button:disabled{background:#2a3942;color:#8696a0;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  <h1>🛒 بقالة — Test Harness</h1>
  <span class="status" id="serverStatus">checking...</span>
</div>
<div class="setup">
  Merchant phone: <input id="merchantPhone" value="964770000001" />
  Customer phone: <input id="customerPhone" value="964770000099" />
  <button onclick="seedMerchant()">Seed Test Merchant</button>
  <button onclick="clearChats()">Clear Chats</button>
</div>
<div class="container">
  <div class="phone-panel">
    <div class="panel-label">📱 CUSTOMER — زبون</div>
    <div class="chat" id="cChat"></div>
    <div class="input-bar">
      <input id="cInput" placeholder="اكتب كزبون..." onkeydown="if(event.key==='Enter')sendMsg('customer')" />
      <button onclick="sendMsg('customer')">ارسل</button>
    </div>
  </div>
  <div class="phone-panel">
    <div class="panel-label">📱 MERCHANT — صاحب البقالة</div>
    <div class="chat" id="mChat"></div>
    <div class="input-bar">
      <input id="mInput" placeholder="اكتب كتاجر..." onkeydown="if(event.key==='Enter')sendMsg('merchant')" />
      <button onclick="sendMsg('merchant')">ارسل</button>
    </div>
  </div>
</div>
<script>
const API = '';

async function checkHealth() {
  const el = document.getElementById('serverStatus');
  try {
    const r = await fetch('/health');
    const d = await r.json();
    el.textContent = `✓ ${d.service} (${d.mode})`;
    el.className = 'status ok';
  } catch {
    el.textContent = '✗ server offline';
    el.className = 'status err';
  }
}
checkHealth(); setInterval(checkHealth, 10000);

function addMsg(chatId, type, text) {
  const chat = document.getElementById(chatId);
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const time = new Date().toLocaleTimeString('ar-IQ', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = text + `<div class="meta">${time}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMsg(role) {
  const isCustomer = role === 'customer';
  const input = document.getElementById(isCustomer ? 'cInput' : 'mInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const from = document.getElementById(isCustomer ? 'customerPhone' : 'merchantPhone').value;
  const chatId = isCustomer ? 'cChat' : 'mChat';
  addMsg(chatId, 'out', text);
  try {
    const r = await fetch('/test/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ from, content: text, messageType: 'text' }),
    });
    const data = await r.json();
    if (data.responses) {
      const merchantPhone = document.getElementById('merchantPhone').value;
      const customerPhone = document.getElementById('customerPhone').value;
      for (const resp of data.responses) {
        if (resp.to === customerPhone) addMsg('cChat', 'in', resp.text);
        else if (resp.to === merchantPhone) addMsg('mChat', 'in', resp.text);
        else addMsg(chatId, 'in', resp.text);
      }
    }
    if (data.error) addMsg(chatId, 'in', `⚠️ Error: ${data.error}`);
  } catch (err) {
    addMsg(chatId, 'in', `⚠️ Server error: ${err.message}`);
  }
}

async function seedMerchant() {
  const phone = document.getElementById('merchantPhone').value;
  try {
    const r = await fetch('/test/seed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone }),
    });
    const d = await r.json();
    addMsg('mChat', 'in', d.ok ? `✅ Test merchant seeded: ${d.merchant.name_ar} (${phone})` : `⚠️ ${d.error}`);
  } catch (err) {
    addMsg('mChat', 'in', `⚠️ Seed failed: ${err.message}`);
  }
}

function clearChats() {
  document.getElementById('cChat').innerHTML = '';
  document.getElementById('mChat').innerHTML = '';
}
</script>
</body>
</html>
